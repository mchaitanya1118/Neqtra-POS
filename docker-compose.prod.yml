version: '3.8'

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_DATABASE: neqtra_pos
      JWT_SECRET: ${JWT_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE:-true}
      PHONEPE_MERCHANT_ID: ${PHONEPE_MERCHANT_ID}
      PHONEPE_SALT_KEY: ${PHONEPE_SALT_KEY}
      PHONEPE_SALT_INDEX: ${PHONEPE_SALT_INDEX}
      PHONEPE_HOST_URL: ${PHONEPE_HOST_URL}
      COOLIFY_API_TOKEN: ${COOLIFY_API_TOKEN}
      COOLIFY_API_URL: ${COOLIFY_API_URL}
      COOLIFY_FRONTEND_UUID: ${COOLIFY_FRONTEND_UUID}
      PORT: 3001
    depends_on:
      - postgres
      - redis
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.backend.rule=Host(`api.neqtra.com`)"
      - "traefik.http.routers.backend.entrypoints=https"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.backend.loadbalancer.server.port=3001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://api.neqtra.com
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.neqtra.com
      BACKEND_URL: http://backend:3001
    depends_on:
      - backend
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"

      # Unified Cloudflare Traefik Routing Rule
      - "traefik.http.routers.pos-frontend.rule=Host(`neqtra.com`) || Host(`thebox.neqtra.com`) || Host(`box.neqtra.com`) || HostRegexp(`{subdomain:[a-z0-9-]+}.neqtra.com`)"
      - "traefik.http.routers.pos-frontend.entrypoints=https"
      - "traefik.http.routers.pos-frontend.tls=true"
      - "traefik.http.routers.pos-frontend.tls.certresolver=cloudflare"
      - "traefik.http.routers.pos-frontend.tls.domains[0].main=neqtra.com"
      - "traefik.http.routers.pos-frontend.tls.domains[0].sans=*.neqtra.com"
      - "traefik.http.routers.pos-frontend.service=pos-frontend"

      - "traefik.http.services.pos-frontend.loadbalancer.server.port=3000"

  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: neqtra_pos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - coolify

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - coolify

  pgadmin:
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@neqtra.com
      PGADMIN_DEFAULT_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.pgadmin.rule=Host(`pgadmin.neqtra.com`)"
      - "traefik.http.routers.pgadmin.entrypoints=https"
      - "traefik.http.routers.pgadmin.tls.certresolver=letsencrypt"
      - "traefik.http.services.pgadmin.loadbalancer.server.port=80"

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:


networks:
  coolify:
    external: true
